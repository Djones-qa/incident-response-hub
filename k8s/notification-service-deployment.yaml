apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: incident-hub
  labels:
    app: notification-service
    app.kubernetes.io/part-of: incident-response-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: incident-hub/notification-service:latest
          ports:
            - containerPort: 4001
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: PORT
              value: "4001"
            - name: NODE_ENV
              value: "production"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: REDIS_PORT
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: incident-hub
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 4001
      targetPort: 4001
  type: ClusterIP
