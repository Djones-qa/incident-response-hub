apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: incident-hub
  labels:
    app: analytics-service
    app.kubernetes.io/part-of: incident-response-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: incident-hub/analytics-service:latest
          ports:
            - containerPort: 4002
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: PORT
              value: "4002"
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: incident-hub-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: incident-hub-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: REDIS_PORT
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: incident-hub
  labels:
    app: analytics-service
spec:
  selector:
    app: analytics-service
  ports:
    - protocol: TCP
      port: 4002
      targetPort: 4002
  type: ClusterIP
