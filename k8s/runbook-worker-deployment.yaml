apiVersion: apps/v1
kind: Deployment
metadata:
  name: runbook-worker
  namespace: incident-hub
  labels:
    app: runbook-worker
    app.kubernetes.io/part-of: incident-response-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: runbook-worker
  template:
    metadata:
      labels:
        app: runbook-worker
    spec:
      containers:
        - name: runbook-worker
          image: incident-hub/runbook-worker:latest
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: incident-hub-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: incident-hub-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: incident-hub-config
                  key: REDIS_PORT
