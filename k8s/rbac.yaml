apiVersion: v1
kind: ServiceAccount
metadata:
  name: incident-hub-sa
  namespace: incident-hub
  labels:
    app.kubernetes.io/part-of: incident-response-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: incident-hub-role
  namespace: incident-hub
  labels:
    app.kubernetes.io/part-of: incident-response-platform
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: incident-hub-rolebinding
  namespace: incident-hub
  labels:
    app.kubernetes.io/part-of: incident-response-platform
subjects:
  - kind: ServiceAccount
    name: incident-hub-sa
    namespace: incident-hub
roleRef:
  kind: Role
  name: incident-hub-role
  apiGroup: rbac.authorization.k8s.io
