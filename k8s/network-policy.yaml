apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: incident-hub-network-policy
  namespace: incident-hub
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic within the namespace
    - from:
        - podSelector: {}
  egress:
    # Allow traffic within the namespace
    - to:
        - podSelector: {}
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow external ingress to API services only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-apis
  namespace: incident-hub
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - incident-engine
          - notification-service
          - analytics-service
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 4000
        - protocol: TCP
          port: 4001
        - protocol: TCP
          port: 4002
---
# Deny direct external access to data stores
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-external-to-datastores
  namespace: incident-hub
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-external-to-redis
  namespace: incident-hub
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
