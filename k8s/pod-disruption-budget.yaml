apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: incident-engine-pdb
  namespace: incident-hub
  labels:
    app.kubernetes.io/part-of: incident-response-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: incident-engine
