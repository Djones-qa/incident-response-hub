apiVersion: v1
kind: ConfigMap
metadata:
  name: incident-hub-config
  namespace: incident-hub
  labels:
    app.kubernetes.io/part-of: incident-response-platform
data:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "incident_response"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: incident-hub-secrets
  namespace: incident-hub
  labels:
    app.kubernetes.io/part-of: incident-response-platform
type: Opaque
data:
  # Base64 encoded values (decode: echo -n 'value' | base64)
  # DB_USER: postgres -> cG9zdGdyZXM=
  # DB_PASSWORD: postgres -> cG9zdGdyZXM=
  DB_USER: cG9zdGdyZXM=
  DB_PASSWORD: cG9zdGdyZXM=
